<mat-toolbar color="primary">
    <mat-toolbar-row class="mat-elevation-z2">
        <span>File Explorer</span>
        <span class="spacer"></span>
        <button mat-icon-button matTooltip="Back" [routerLink]="['../']"><mat-icon>keyboard_arrow_up</mat-icon></button>
    </mat-toolbar-row>
</mat-toolbar>

<mat-drawer-container class="drawer-container">
    <mat-drawer mode="side" opened style="width: 250px">
        <button mat-raised-button color="primary" style="margin: 10px; height: 50px; border-radius: 30px; padding-left: 20px; padding-right: 30px" [matMenuTriggerFor]="menuNewOperation">
            <mat-icon style="font-size: x-large;">add</mat-icon>
            <span style="font-weight: bolder; padding-left: 10px; font-size: large;">New</span>
        </button>

        <mat-menu #menuNewOperation="matMenu">
            <button mat-menu-item>
                <mat-icon>create_new_folder</mat-icon>
                <span>Folder</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item>
                <mat-icon>upload_file</mat-icon>
                <span>File upload</span>
            </button>
            <button mat-menu-item>
                <mat-icon>drive_folder_upload</mat-icon>
                <span>Folder upload</span>
            </button>
          </mat-menu>

        <mat-divider></mat-divider>
        <mat-nav-list>
            <a mat-list-item>Storage</a>
        </mat-nav-list>
    </mat-drawer>
    <mat-drawer-content style="padding: 20px">
        <h2>My Drive</h2>
        <mat-divider></mat-divider>
        <div style="overflow: auto">
            123
        </div>
    </mat-drawer-content>
</mat-drawer-container>
